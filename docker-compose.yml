# Lucid Self-Hosted — Minimal stack
# Usage: docker compose up
#
# Services: PostgreSQL + PostgREST + GoTrue + Redis + Web + Worker
# Optional extras (Kong, Studio, Realtime): see docker-compose.full.yml
#
# Image versions — pinned for reproducibility. To upgrade:
#   1. Check release notes for the service
#   2. Update the tag below
#   3. docker compose pull && docker compose up -d

x-common-env: &common-env
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

services:
  # ─── Database ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg15  # Standard PostgreSQL 15 + pgvector extension
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lucid
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/volumes/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lucid

  # ─── Migrations (init container — runs once, exits) ──────
  migrate:
    build:
      context: .
      dockerfile: docker/migrate/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/lucid
    restart: "no"
    networks:
      - lucid

  # ─── PostgREST (REST API for supabase-js) ────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.3  # Upgrade: check https://hub.docker.com/r/postgrest/postgrest/tags
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/lucid
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    # PostgREST v12 uses a static binary image (no shell/wget/curl),
    # so healthcheck must be disabled. Dependent services use service_started.
    networks:
      - lucid

  # ─── GoTrue (Auth — JWT + email/password) ─────────────────
  gotrue:
    image: supabase/gotrue:v2.158.1  # Upgrade: check https://hub.docker.com/r/supabase/gotrue/tags
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/lucid?sslmode=disable
      GOTRUE_SITE_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@localhost
      GOTRUE_SMTP_HOST: ""
      GOTRUE_SMTP_PORT: "587"
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_SENDER_NAME: Lucid
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lucid

  # ─── API Gateway (routes supabase-js paths) ──────────────
  # supabase-js expects /rest/v1/* and /auth/v1/* — this lightweight
  # nginx proxy replaces Kong for the minimal self-host stack.
  api-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      postgrest:
        condition: service_started
      gotrue:
        condition: service_healthy
    volumes:
      - ./docker/api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - lucid

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine  # Upgrade: check https://hub.docker.com/_/redis/tags
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lucid

  # ─── Web (Next.js) ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_DEPLOYMENT_MODE: self-hosted
        NEXT_PUBLIC_AUTH_PROVIDER: ${AUTH_PROVIDER:-local}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${LUCID_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_DEPLOYMENT_MODE: self-hosted
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}

      # Supabase — via API gateway (routes /rest/v1 → PostgREST, /auth/v1 → GoTrue)
      NEXT_PUBLIC_SUPABASE_URL: http://api-gateway:8000
      SUPABASE_URL: http://api-gateway:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # Auth
      AUTH_PROVIDER: ${AUTH_PROVIDER:-local}
      NEXT_PUBLIC_AUTH_PROVIDER: ${AUTH_PROVIDER:-local}
      GOTRUE_URL: http://gotrue:9999
      JWT_SECRET: ${JWT_SECRET}

      # Redis
      REDIS_URL: redis://redis:6379

      # LLM (user provides at least one)
      TRUSTGATE_API_KEY: ${TRUSTGATE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FALLBACK_PROVIDER_URL: ${FALLBACK_PROVIDER_URL:-}
      FALLBACK_PROVIDER_KEY: ${FALLBACK_PROVIDER_KEY:-}
      FALLBACK_PROVIDER_MODEL: ${FALLBACK_PROVIDER_MODEL:-}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MESSAGE_ENCRYPTION_MASTER_KEY: ${MESSAGE_ENCRYPTION_MASTER_KEY}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}

      # Worker
      WORKER_URL: http://worker:8080

      # Features
      FEATURE_AGENT_RUNTIME: "true"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - lucid

  # ─── Worker (Agent processor) ────────────────────────────
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 8080

      # Supabase — via API gateway (routes /rest/v1 → PostgREST, /auth/v1 → GoTrue)
      SUPABASE_URL: http://api-gateway:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # Redis
      REDIS_URL: redis://redis:6379

      # LLM
      TRUSTGATE_API_KEY: ${TRUSTGATE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FALLBACK_PROVIDER_URL: ${FALLBACK_PROVIDER_URL:-}
      FALLBACK_PROVIDER_KEY: ${FALLBACK_PROVIDER_KEY:-}
      FALLBACK_PROVIDER_MODEL: ${FALLBACK_PROVIDER_MODEL:-}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MESSAGE_ENCRYPTION_MASTER_KEY: ${MESSAGE_ENCRYPTION_MASTER_KEY}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}

      # Self-host
      NEXT_PUBLIC_DEPLOYMENT_MODE: self-hosted
      FEATURE_AGENT_RUNTIME: "true"

      # Broadcast Wake — push-based inbound (dedicated runtimes only, requires LUCID_RUNTIME_ID)
      # FEATURE_BROADCAST_WAKE: "false"
      # BROADCAST_FALLBACK_POLL_INTERVAL: "30000"
    networks:
      - lucid

volumes:
  db-data:
  redis-data:

networks:
  lucid:
    driver: bridge
