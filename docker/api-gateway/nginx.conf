# Minimal API Gateway — routes supabase-js paths to backend services
# Replaces Kong for self-hosted deployments
# supabase-js expects: /rest/v1/* → PostgREST, /auth/v1/* → GoTrue

upstream postgrest {
    server postgrest:3000;
}

upstream gotrue {
    server gotrue:9999;
}

server {
    listen 8000;
    listen [::]:8000;
    server_name _;

    # supabase-js REST calls → PostgREST
    location /rest/v1/ {
        proxy_pass http://postgrest/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # supabase-js auth calls → GoTrue
    location /auth/v1/ {
        proxy_pass http://gotrue/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
